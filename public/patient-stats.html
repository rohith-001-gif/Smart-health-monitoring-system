<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Patient Stats – Arogya</title>
  <link rel="stylesheet" href="style.css">
</head>
<body class="doctor-theme">
  <div class="lux-bg" aria-hidden="true">
    <span class="lux-orb orb-one"></span>
    <span class="lux-orb orb-two"></span>
    <span class="lux-orb orb-three"></span>
    <span class="lux-grid"></span>
  </div>

  <div class="page-shell">
    <header class="stats-header">
      <div>
        <h1 id="pageTitle">Patient Statistics</h1>
        <p class="subtle" id="watchInfo">Loading…</p>
      </div>
      <button id="backBtn" class="secondary-btn" type="button">← Back to Dashboard</button>
    </header>

    <section class="card">
      <h2>Patient Details</h2>
      <div class="patient-details" id="patientDetails"></div>
    </section>

    <section class="card">
      <h2>Vitals Snapshot</h2>
      <div class="stats-grid" id="snapshotCards"></div>
    </section>

    <section class="card">
      <h2>Trend Graph</h2>
      <div class="chart-wrap">
        <div class="chart-head">
          <label>Metric
            <select id="metricSelect">
              <option value="hr">Heart Rate</option>
              <option value="spo2">SpO2</option>
              <option value="steps">Steps</option>
            </select>
          </label>
          <p class="subtle">Last 30 readings</p>
        </div>
        <svg id="lineChart" class="line-chart" viewBox="0 0 800 280" preserveAspectRatio="none"></svg>
      </div>
    </section>

    <section class="card">
      <h2>Care Assistant</h2>
      <div class="chatbot">
        <div id="chatLog" class="chat-log"></div>
        <div class="chat-input-row">
          <input id="chatInput" placeholder="Ask: latest vitals, risk, summary, next steps…">
          <button id="chatSendBtn" type="button">Send</button>
        </div>
      </div>
    </section>
  </div>

  <script src="patient-stats.js"></script>
</body>
</html>
